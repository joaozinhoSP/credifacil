[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Webhook endpoint -> Netlify Function
[[redirects]]
  from = "/webhook/fortpay"
  to = "/.netlify/functions/webhook"
  status = 200

# SPA fallback for React Router (must be LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
